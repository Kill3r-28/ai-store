# Paste into Streamlit Cloud → Settings → Secrets → Save → Reboot
# Do NOT include an [auth] section (that enables broken /oauth2callback).

DEV_SKIP_AUTH = "false"

APP_PUBLIC_URL = "https://nxtwave-ai-store.streamlit.app"

ALLOWED_EMAIL_DOMAINS = "nxtwave.co.in"
ADMIN_EMAILS = "you@nxtwave.co.in"

GITHUB_TOKEN = "ghp_your_token_here"

GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "GOCSPX-YOUR_CLIENT_SECRET"
OAUTH_STATE_SECRET = "generate-a-long-random-string-at-least-32-chars"
